<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adivina el Número</title>
<style>
    body{
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f0f0f0;
        margin-top: 50px;
    }
    .contenedor{
        background: white;
        width: 350px;
        margin: auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
    }
    input, button{
        padding: 10px;
        margin: 10px;
    }
    #mensaje{
        font-weight: bold;
        margin-top: 15px;
    }
</style>
</head>
<body>

<div class="contenedor">
    <h1>🎯 Adivina el Número</h1>
    <p>Estoy pensando en un número del 1 al 100.</p>

    <input type="number" id="numero" min="1" max="100">
    <button onclick="verificar()">Intentar</button>

    <p id="mensaje"></p>
    <p>Intentos: <span id="intentos">0</span></p>
</div>

<script>
    let secreto = Math.floor(Math.random() * 100) + 1;
    let intentos = 0;

    function verificar() {
        let numero = parseInt(document.getElementById("numero").value);
        let mensaje = document.getElementById("mensaje");

        if (isNaN(numero)) {
            mensaje.textContent = "Ingresa un número.";
            return;
        }

        intentos++;
        document.getElementById("intentos").textContent = intentos;

        if (numero === secreto) {
            mensaje.textContent = "🎉 ¡Ganaste! El número era " + secreto;
            mensaje.style.color = "green";
        } else if (numero < secreto) {
            mensaje.textContent = "⬆️ El número es mayor.";
            mensaje.style.color = "blue";
        } else {
            mensaje.textContent = "⬇️ El número es menor.";
            mensaje.style.color = "red";
        }
    }
</script>

</body>
</html>
