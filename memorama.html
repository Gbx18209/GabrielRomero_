<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorama de Fútbol</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f5132,#198754);
    color:white;
    text-align:center;
    margin:0;
}

h1{
    margin-top:20px;
}

#moves{
    font-size:20px;
    margin-bottom:20px;
}

.board{
    width:800px;
    max-width:95%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.card{
    height:120px;
    background:#1b1b1b;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
    user-select:none;
}

.card.hidden{
    background:#0d6efd;
    color:transparent;
}

.card.matched{
    background:#ffc107;
    color:black;
    cursor:default;
}

button{
    margin:20px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>⚽ Memorama de Equipos de Fútbol ⚽</h1>

<div id="moves">Movimientos: 0</div>

<div class="board" id="board"></div>

<button onclick="startGame()">Reiniciar</button>

<script>

const teams = [
"Real Madrid",
"Barcelona",
"Manchester City",
"Liverpool",
"PSG",
"Bayern",
"Juventus",
"Arsenal"
];

let cards = [];
let firstCard = null;
let secondCard = null;
let lockBoard = false;
let moves = 0;
let matches = 0;

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function startGame(){

    const board = document.getElementById("board");

    board.innerHTML="";

    cards = [...teams,...teams];

    shuffle(cards);

    firstCard = null;
    secondCard = null;
    lockBoard = false;
    moves = 0;
    matches = 0;

    document.getElementById("moves").textContent =
    "Movimientos: 0";

    cards.forEach(team=>{

        const card = document.createElement("div");

        card.classList.add("card","hidden");

        card.dataset.team = team;

        card.textContent = team;

        card.addEventListener("click",flipCard);

        board.appendChild(card);
    });
}

function flipCard(){

    if(lockBoard) return;

    if(this === firstCard) return;

    if(this.classList.contains("matched")) return;

    this.classList.remove("hidden");

    if(!firstCard){
        firstCard = this;
        return;
    }

    secondCard = this;

    moves++;

    document.getElementById("moves").textContent =
    "Movimientos: " + moves;

    checkMatch();
}

function checkMatch(){

    const isMatch =
    firstCard.dataset.team === secondCard.dataset.team;

    if(isMatch){

        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        matches++;

        resetTurn();

        if(matches === teams.length){

            setTimeout(()=>{
                alert(
                "🏆 ¡Ganaste! Movimientos: "
                + moves);
            },300);
        }

    }else{

        lockBoard = true;

        setTimeout(()=>{

            firstCard.classList.add("hidden");
            secondCard.classList.add("hidden");

            resetTurn();

        },1000);
    }
}

function resetTurn(){
    firstCard = null;
    secondCard = null;
    lockBoard = false;
}

startGame();

</script>

</body>
</html>
